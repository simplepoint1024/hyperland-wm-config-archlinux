# Hyprland common desktop config
# Backup created automatically before this file was updated.
$mod = SUPER
$terminal = tilda
$launcher = __HOME__/.local/bin/hypr-app-launcher
$fileManager = __HOME__/.local/bin/hypr-file-manager
$locker = __HOME__/.local/bin/hypr-lock
$shot = __HOME__/.local/bin/hypr-screenshot
# Display scaling
monitor = eDP-1,preferred,0x0,1.5
monitor = HDMI-A-3,preferred,1707x0,1
exec-once = __HOME__/.local/bin/hypr-startup
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = SDL_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = INPUT_METHOD,fcitx
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
xwayland {
    force_zero_scaling = true
}
general {
    gaps_in = 3
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(7aa2f7ff)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.96
    blur {
        enabled = true
        size = 6
        passes = 2
        ignore_opacity = true
    }
    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(00000055)
    }
}
animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    animation = windows,1,6,easeOutQuint,popin 80%
    animation = windowsOut,1,5,easeInOutCubic,slide
    animation = border,1,8,easeOutQuint
    animation = fade,1,6,easeOutQuint
    animation = workspaces,1,6,easeOutQuint,slidevert
}
dwindle {
    pseudotile = true
    preserve_split = true
}
master {
    new_status = master
}
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = true
    vfr = true
}
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        disable_while_typing = false
    }
}
gesture = 3, horizontal, workspace
bind = $mod, Return, exec, $terminal
bind = $mod, D, exec, $launcher
bind = $mod, E, exec, $fileManager
bind = $mod, L, exec, $locker
bind = $mod, Q, killactive,
bind = $mod SHIFT, Q, exit,
bind = $mod, F, fullscreen, 1
bind = $mod, V, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
bind = $mod, TAB, workspace, previous
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bind = $mod CTRL, left, resizeactive, -80 0
bind = $mod CTRL, right, resizeactive, 80 0
bind = $mod CTRL, up, resizeactive, 0 -80
bind = $mod CTRL, down, resizeactive, 0 80
bind = $mod, KP_Left, moveactive, -20 0
bind = $mod, KP_Right, moveactive, 20 0
bind = $mod, KP_Up, moveactive, 0 -20
bind = $mod, KP_Down, moveactive, 0 20
bind = $mod, KP_4, moveactive, -20 0
bind = $mod, KP_6, moveactive, 20 0
bind = $mod, KP_8, moveactive, 0 -20
bind = $mod, KP_2, moveactive, 0 20
bind = , Print, exec, $shot full
bind = SHIFT, Print, exec, $shot area
bind = $mod, Print, exec, $shot area
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bindl = , XF86AudioMute, exec, bash -lc 'command -v wpctl >/dev/null && wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle'
bindel = , XF86AudioRaiseVolume, exec, bash -lc 'command -v wpctl >/dev/null && wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+'
bindel = , XF86AudioLowerVolume, exec, bash -lc 'command -v wpctl >/dev/null && wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-'
bindel = , XF86MonBrightnessUp, exec, bash -lc 'command -v brightnessctl >/dev/null && brightnessctl set +10%'
bindel = , XF86MonBrightnessDown, exec, bash -lc 'command -v brightnessctl >/dev/null && brightnessctl set 10%-'
layerrule = match:namespace = ^(waybar)$, blur = true
layerrule = match:namespace = ^(wofi)$, blur = true
windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = yes
    size = 980 720
}
windowrule {
    name = float-polkit-agent
    match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
    float = yes
}
windowrule {
    name = float-nm-connection-editor
    match:class = ^(nm-connection-editor)$
    float = yes
}
windowrule {
    name = float-blueman-manager
    match:class = ^(blueman-manager)$
    float = yes
}
windowrule {
    name = glass-tilda
    match:class = ^(Tilda)$
    opacity = 0.82 0.78
}
bind = $mod, 1, workspace, 1
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod, 2, workspace, 2
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod, 3, workspace, 3
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod, 4, workspace, 4
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod, 6, workspace, 6
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod, 7, workspace, 7
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod, 8, workspace, 8
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 9, movetoworkspace, 9
